        // Timer Logic for Skip Ad
        function startSkipTimer(cardElement) {
            window.open(smartlink, "_blank"); // Open Ad on First Click
            
            const overlay = cardElement;
            const playBtn = overlay.querySelector('.play-hint');
            const skipContainer = overlay.querySelector('.skip-container');

            playBtn.style.display = "none";
            skipContainer.style.display = "block";

            const interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    timerText.innerText = `Ad will skip in ${seconds}s...`;
                } else {
                    clearInterval(interval);
                    timerText.style.display = "none";
                    skipBtn.style.display = "inline-block";
                }
            }, 1000);
        }

            event.stopPropagation();
